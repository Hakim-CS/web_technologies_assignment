<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Login to TechNova Store" />
  <title>TechNova | Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">Tech<span>Nova</span></a>
      <div class="ms-auto">
        <a href="index.html" class="btn btn-outline-primary btn-sm">← Back to Home</a>
      </div>
    </div>
  </nav>

  <!-- ===== MAIN ===== -->
  <main class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-sm-10 col-md-6 col-lg-5">

          <!-- Login Card -->
          <div class="card p-4">
            <div class="text-center mb-4">
              <div style="font-size:3rem;">🔑</div>
              <h2 class="text-white">Login</h2>
              <p>Sign in to your <b>TechNova</b> account</p>
            </div>

            <!-- Error Alert (shown on bad login) -->
            <div id="loginError" class="alert alert-danger" style="display:none;"></div>

            <!-- Login Form -->
            <!-- onsubmit calls handleLogin() from js/auth.js -->
            <form id="loginForm" onsubmit="handleLogin(event)" novalidate>

              <div class="mb-3">
                <label for="loginUsername" class="form-label">Username</label>
                <input type="text" id="loginUsername" name="username"
                       class="form-control" placeholder="e.g. admin" autocomplete="username" />
              </div>

              <div class="mb-3">
                <label for="loginPassword" class="form-label">Password</label>
                <input type="password" id="loginPassword" name="password"
                       class="form-control" placeholder="Enter your password" autocomplete="current-password" />
              </div>

              <button type="submit" id="loginBtn" class="btn btn-primary w-100">
                🔑 Login
              </button>

            </form>

            <hr />

            <!-- Demo credentials hint (for the assignment) -->
            <div class="alert alert-info mb-0" style="font-size:0.85rem;">
              <strong>Demo accounts:</strong><br />
              👤 <code>admin</code> / <code>admin123</code><br />
              👤 <code>john</code> / <code>john123</code><br />
              👤 <code>sara</code> / <code>sara456</code>
            </div>
          </div>

        </div>
      </div>
    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="py-4 mt-4">
    <div class="container text-center">
      <p class="mb-0">&copy; 2026 <b>TechNova</b>. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
